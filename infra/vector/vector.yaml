# Vector pipeline: Redpanda topic → normalize (VRL) → OpenSearch.
# Owned by feat/infra-pipeline. Field mapping contract: docs/architecture.md#normalized-fields

# The elasticsearch sink's strftime index template renders against the event's
# timestamp field named here — pointing it at "@timestamp" makes the daily
# guardian-traffic-%Y.%m.%d indices key off *event* time, not ingest time.
log_schema:
  timestamp_key: "@timestamp"

sources:
  telemetry_raw:
    type: kafka
    bootstrap_servers: redpanda:9092
    group_id: guardian-vector
    topics:
      - guardian.telemetry.raw
    # Deliberately NO `decoding.codec: json` here: the kafka source overwrites
    # the decoded envelope's `timestamp` field with the Kafka message timestamp,
    # destroying the event time. Decoding happens in the normalize transform
    # instead (parse_json), which also lets us log-and-drop junk payloads in
    # one place without wedging the pipeline.

  # Detection-layer topics (Week 2): ARGUS emits index-shaped documents; Vector
  # is the single OpenSearch write path, so it carries them into their indices.
  # Distinct group ids — mixing subscriptions inside one consumer group breaks
  # rebalancing.
  scores_raw:
    type: kafka
    bootstrap_servers: redpanda:9092
    group_id: guardian-vector-scores
    topics:
      - guardian.scores

  alerts_raw:
    type: kafka
    bootstrap_servers: redpanda:9092
    group_id: guardian-vector-alerts
    topics:
      - guardian.alerts

transforms:
  normalize:
    type: remap
    inputs: [telemetry_raw]
    # Never forward a raw/unnormalized event on VRL failure; log and drop.
    drop_on_error: true
    drop_on_abort: true
    source: |
      parsed, err = parse_json(string!(.message))
      if err != null {
        log("normalize: dropping undecodable payload: " + err, level: "warn", rate_limit_secs: 10)
        abort
      }
      ev, err = object(parsed)
      if err != null {
        log("normalize: dropping non-object JSON payload: " + err, level: "warn", rate_limit_secs: 10)
        abort
      }

      out = {}

      out."@timestamp" = parse_timestamp(string(ev.timestamp) ?? "", "%+") ?? now()
      out.event = {
        "id":   ev.event_id,
        "type": ev.event_type
      }
      out.source = { "service": ev.source }
      out.network = { "client_ip": ev.client_ip }
      out.transaction = {
        "payer_id":   ev.payer_id,
        "payee_id":   ev.payee_id,
        "channel":    ev.channel,
        "amount":     ev.amount,
        "currency":   ev.currency,
        "status":     ev.status,
        "latency_ms": ev.latency_ms
      }
      out.security = {
        "is_attack":      bool(ev.is_attack) ?? false,
        "attack_pattern": ev.attack_pattern,
        "is_malformed":   !(bool(ev.raw_payload_valid) ?? true)
      }

      # Application/gateway log line (Week 3: SENTINEL template mining). Optional
      # on the envelope — old queued events won't carry it, so only attach when
      # present to avoid an empty log object on legacy records.
      if ev.log_message != null {
        out.log = { "message": ev.log_message }
      }

      status = string(ev.status) ?? "unknown"
      out.error = includes(["declined", "error", "malformed"], status)

      out.ingest = {
        "pipeline_stage": "vector",
        "processed_at":   now()
      }

      . = out

  # Scores/alerts arrive already index-shaped (contract:
  # docs/architecture.md#detection-layer) — parse, re-type @timestamp so the
  # sinks' strftime index rendering keys off event time, drop junk.
  scores_parse:
    type: remap
    inputs: [scores_raw]
    drop_on_error: true
    drop_on_abort: true
    source: |
      parsed, err = parse_json(string!(.message))
      if err != null {
        log("scores_parse: dropping undecodable payload: " + err, level: "warn", rate_limit_secs: 10)
        abort
      }
      doc, err = object(parsed)
      if err != null {
        log("scores_parse: dropping non-object JSON payload: " + err, level: "warn", rate_limit_secs: 10)
        abort
      }
      . = doc
      ."@timestamp" = parse_timestamp(string(doc."@timestamp") ?? "", "%+") ?? now()

  alerts_parse:
    type: remap
    inputs: [alerts_raw]
    drop_on_error: true
    drop_on_abort: true
    source: |
      parsed, err = parse_json(string!(.message))
      if err != null {
        log("alerts_parse: dropping undecodable payload: " + err, level: "warn", rate_limit_secs: 10)
        abort
      }
      doc, err = object(parsed)
      if err != null {
        log("alerts_parse: dropping non-object JSON payload: " + err, level: "warn", rate_limit_secs: 10)
        abort
      }
      . = doc
      ."@timestamp" = parse_timestamp(string(doc."@timestamp") ?? "", "%+") ?? now()

sinks:
  opensearch_out:
    type: elasticsearch
    inputs: [normalize]
    endpoints: ["https://opensearch:9200"]
    mode: bulk
    api_version: v7
    bulk:
      index: "guardian-traffic-%Y.%m.%d"
    auth:
      strategy: basic
      user: admin
      password: "${OPENSEARCH_ADMIN_PASSWORD:-Guardian!Lti2026}"
    tls:
      verify_certificate: false
      verify_hostname: false
    # OpenSearch reports a non-ES version string; skip the ES healthcheck handshake
    healthcheck:
      enabled: false

  # Fan-out for the detection layer: normalized events also go back onto the
  # queue so scorer services (ARGUS, later SENTINEL/CASSANDRA) consume the same
  # normalized shape that lands in OpenSearch — one normalization, many readers.
  normalized_out:
    type: kafka
    inputs: [normalize]
    bootstrap_servers: redpanda:9092
    topic: guardian.telemetry.normalized
    encoding:
      codec: json

  scores_out:
    type: elasticsearch
    inputs: [scores_parse]
    endpoints: ["https://opensearch:9200"]
    mode: bulk
    api_version: v7
    bulk:
      index: "guardian-scores-%Y.%m.%d"
    auth:
      strategy: basic
      user: admin
      password: "${OPENSEARCH_ADMIN_PASSWORD:-Guardian!Lti2026}"
    tls:
      verify_certificate: false
      verify_hostname: false
    healthcheck:
      enabled: false

  alerts_out:
    type: elasticsearch
    inputs: [alerts_parse]
    endpoints: ["https://opensearch:9200"]
    mode: bulk
    api_version: v7
    bulk:
      index: "guardian-alerts-%Y.%m.%d"
    auth:
      strategy: basic
      user: admin
      password: "${OPENSEARCH_ADMIN_PASSWORD:-Guardian!Lti2026}"
    tls:
      verify_certificate: false
      verify_hostname: false
    healthcheck:
      enabled: false
